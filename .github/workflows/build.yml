name: Build Custom Image

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  schedule:
    - cron: '05 10 * * *'   # Daily at 10:05 UTC — always pulls latest aurora-dx-nvidia-open:stable
  workflow_dispatch:

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write       # Required for keyless cosign signing via GitHub OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for unapproved upstream packages
        run: |
          podman pull ghcr.io/ublue-os/aurora-dx-nvidia-open:stable
          NEW=$(comm -23 \
            <(podman run --rm ghcr.io/ublue-os/aurora-dx-nvidia-open:stable \
                rpm -qa --queryformat '%{NAME}\n' | LC_ALL=C sort) \
            <(sed 's/^-*//; s/  [#[].*$//' packages.lock | LC_ALL=C sort))
          if [ -n "$NEW" ]; then
            echo "::error::New packages in upstream Aurora image require approval."
            echo "Run 'scripts/update-lock.sh' locally and commit packages.lock to approve:"
            echo "$NEW" | sed 's/^/  + /'
            exit 1
          fi
          echo "Package whitelist OK"

      - name: Build Image
        uses: blue-build/github-action@v1
        with:
          recipe: recipe.yml          # action prepends ./recipes/ automatically
          registry_token: ${{ secrets.GITHUB_TOKEN }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          pr_event_number: ${{ github.event.number }}
